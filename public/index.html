<!DOCTYPE html>
<html data-bs-theme="dark">
<head>
  <title>Cash Invoice</title>

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      padding: 20px 16px;          /* ← added: breathing room on all sides */
      min-height: 100vh;
      margin: 0;
    }

    .container {
      max-width: 960px;            /* ← keeps content from stretching too wide on large screens */
      margin: 0 auto;              /* ← centers everything */
    }

    h2, h3 {
      color: #ffffff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background-color: #1e1e1e;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;               /* slightly increased cell padding */
      color: #e0e0e0;
    }

    th {
      background-color: #2d2d2d;
      color: #ffffff;
    }

    input, .form-control {
      background-color: #2d2d2d;
      color: #ffffff;
      border: 1px solid #555;
    }

    input::placeholder {
      color: #aaa;
    }

    .invoice-item {
      cursor: pointer;
      padding: 8px;
      color: #e0e0e0;
    }

    .invoice-item:hover {
      background-color: #333;
    }

    hr {
      border-color: #444;
      margin: 2rem 0;              /* more space around divider */
    }

    ul#invoiceList li {
      color: #e0e0e0;
    }
  </style>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<div class="container">   <!-- ← all content wrapped here -->

  <h2 class="mb-4">Cash Invoice</h2>

  <input id="customer" class="form-control mb-4" placeholder="Customer Name" />

  <h3 class="mb-3">Add Item</h3>
  <div class="row g-3 mb-4">
    <div class="col">
      <input id="desc" class="form-control" placeholder="Description" />
    </div>
    <div class="col-2">
      <input id="qty" type="number" class="form-control" placeholder="Qty" min="1" />
    </div>
    <div class="col-3">
      <input id="price" type="number" class="form-control" placeholder="Price" min="0.01" step="0.01" />
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" onclick="addItem()">Add Item</button>
    </div>
  </div>

  <h3 class="mb-3">Items</h3>
  <table class="mb-4">
    <thead>
      <tr>
        <th>Description</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="items"></tbody>
  </table>

  <div class="d-flex gap-2 mb-5">
    <button class="btn btn-success" onclick="saveInvoice()">Save Invoice</button>
    <button class="btn btn-secondary" onclick="cancelEdit()">Cancel Edit</button>
  </div>

  <hr />

  <h3 class="mb-3">Invoices</h3>

  <div class="mb-3">
    <input 
      id="searchInvoice" 
      class="form-control" 
      placeholder="Search invoices by customer or date..." 
      oninput="filterInvoices()"
    />
  </div>

  <ul id="invoiceList" class="list-group mb-5"></ul>

  <div id="printArea" style="display:none"></div>

</div>  <!-- end of .container -->

<script src="app.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Client-side filtering -->
<script>
function filterInvoices() {
  const filterValue = document.getElementById('searchInvoice').value.toLowerCase().trim();
  const listItems = document.querySelectorAll('#invoiceList li');
  listItems.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = (filterValue === '' || text.includes(filterValue)) ? '' : 'none';
  });
}
</script>

</body>
</html>
